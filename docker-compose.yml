version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jilani-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: jilani_db
    ports:
      - "5432:5432"
    volumes:
      - jilani_pgdata:/var/lib/postgresql/data

volumes:
  jilani_pgdata:
